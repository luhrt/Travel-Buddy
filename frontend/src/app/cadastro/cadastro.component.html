<main class="content">
    <section class="cadastro">
        <div class="cadastro__container">
            <h1 class="welcome__title cadastro__title">Bem vindo ao TravelBuddy!</h1>
            <p class="welcome__text cadastro__text">Seja bem vindo! Crie sua conta e faça parte da nossa comunidade de viajantes. Comece a explorar destinos incríveis com facilidade hoje mesmo!</p>
            <div class="form">
                <h2 class="form__title">Cadastre-se</h2>
                <form class="form__container" action="#" method="post">
                    <input class="form__input" type="email" id="email" name="email" placeholder="Email" required>
        
                    <input class="form__input" type="password" id="senha" name="senha" placeholder="Senha" required>
        
                    <button class="form__button" type="submit">Cadastre-se</button>
                </form>
            </div>
        </div>
        <img class="cadastro__image" src="assets/img/imagem_cadastro.png" alt="">
    </section>
</main>
