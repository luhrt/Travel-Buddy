<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Travel Buddy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/index.css" />
</head>
<body>
    <header id="header" alt="Header">
        <div class="flexbox left">
        <h1 class="title">TravelBuddy</h1>
        </div>
        <div class="flexbox center">
        <img src="../src/img/logo.png" width="60" height="auto" />
        </div>
        <div class="flexbox right">
        <h3>Explorar</h3>
        <h3>Login</h3>
        </div>
    </header>
    
    <div class="center" style="background-color: aliceblue; color: violet; width: 100%;"></div>

    <div class="container" >
        <h2>Cadastro</h2>
        <form action="#" method="post">
            <input type="email" id="email" name="email" placeholder="Email" required>

            <input type="password" id="senha" name="senha" placeholder="Senha" required>

            <button type="submit">Cadastrar</button>
        </form>
        <div class="login-link">
            Já tem uma conta? <a href="login.html">Entrar</a>
        </div>
    </div>
</body>
</html>
